name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Docs ↔ data consistency + lib unit tests. Reads the committed results,
      # so it needs no running optimizer — green here means the published numbers
      # match the data anyone can re-run with `./run.sh --all`.
      - name: Tests
        run: npm test

      # The README figures are generated, not hand-typed. Regenerate and fail if
      # the committed SVGs drifted from the committed results — catches both edited
      # and newly-untracked charts.
      - name: Charts are regenerated from results (no hand-edited numbers)
        run: |
          node tools/make-charts.mjs
          if [ -n "$(git status --porcelain -- assets/)" ]; then
            echo "::error::assets/ drifted from results/ — run 'npm run charts' and commit the result"
            git status --porcelain -- assets/
            exit 1
          fi
